<script>
const COLS=13,ROWS=7,TW=40,TH=44;

const TYPES={
  house:  {e:'🏠',n:'Maison',   cost:50,  pop:4,  inc:2,  xp:10,  bg:'#1a0a4a', border:'#8844ff', glow:'#aa66ff'},
  shop:   {e:'🏪',n:'Boutique', cost:120, pop:2,  inc:8,  xp:20,  bg:'#3a1500', border:'#ff8800', glow:'#ffaa00'},
  farm:   {e:'🌾',n:'Ferme',    cost:80,  pop:1,  inc:5,  xp:15,  bg:'#003a10', border:'#00ff66', glow:'#44ff88'},
  factory:{e:'🏭',n:'Usine',    cost:200, pop:0,  inc:15, xp:30,  bg:'#1a1a1a', border:'#00ccff', glow:'#00eeff'},
  park:   {e:'🌳',n:'Parc',     cost:60,  pop:0,  inc:1,  xp:8,   bg:'#002a0a', border:'#00ff44', glow:'#88ffaa'},
  tower:  {e:'🏢',n:'Tour',     cost:350, pop:12, inc:20, xp:50,  bg:'#1a003a', border:'#ff00ff', glow:'#ff44ff'},
  castle: {e:'🏰',n:'Château',  cost:800, pop:30, inc:50, xp:100, bg:'#2a1500', border:'#ffdd00', glow:'#ffee44'},
  temple: {e:'⛩️',n:'Temple',   cost:1500,pop:20, inc:120,xp:200, bg:'#2a0030', border:'#ff00aa', glow:'#ff44cc'},
};

const QUESTS_DEF=[
  {id:'q1',title:'Premiers habitants', desc:'Construis 3 maisons',       check:s=>s.count('house')>=3,    xp:50,  gold:100},
  {id:'q2',title:'Commerce florissant',desc:'Construis 2 boutiques',     check:s=>s.count('shop')>=2,     xp:80,  gold:200},
  {id:'q3',title:'Ville en croissance',desc:'Atteins 50 habitants',      check:s=>s.totalPop()>=50,        xp:120, gold:300},
  {id:'q4',title:'Industrialisation', desc:'Construis 2 usines',         check:s=>s.count('factory')>=2,  xp:150, gold:500},
  {id:'q5',title:'Millionnaire',      desc:'Gagne 1000 pièces d\'or',   check:s=>totalEarned>=1000,       xp:200, gold:400},
  {id:'q6',title:'Parc naturel',      desc:'Construis 3 parcs',          check:s=>s.count('park')>=3,     xp:60,  gold:150},
  {id:'q7',title:'Cité royale',       desc:'Construis un château',       check:s=>s.count('castle')>=1,   xp:300, gold:800},
  {id:'q8',title:'Métropole',         desc:'Atteins 200 habitants',      check:s=>s.totalPop()>=200,       xp:500, gold:1000},
  {id:'q9',title:'Riche marchand',    desc:'Gagne 5000 pièces d\'or',   check:s=>totalEarned>=5000,       xp:400, gold:600},
  {id:'q10',title:'Cité sainte',      desc:'Construis un temple',        check:s=>s.count('temple')>=1,   xp:600, gold:2000},
];

const SHOP_DEF=[
  {id:'s1',name:'Moulins à vent',  desc:'+20% revenu fermes',       price:300,  bought:false,apply:()=>{shopB.farm=(shopB.farm||1)*1.2}},
  {id:'s2',name:'Routes pavées',   desc:'+10% tous les revenus',    price:500,  bought:false,apply:()=>{shopB._g=(shopB._g||1)*1.1}},
  {id:'s3',name:'Foire commerciale',desc:'+30% revenu boutiques',   price:600,  bought:false,apply:()=>{shopB.shop=(shopB.shop||1)*1.3}},
  {id:'s4',name:'Université',      desc:'+25% XP gagné',            price:800,  bought:false,apply:()=>{shopB.xp=(shopB.xp||1)*1.25}},
  {id:'s5',name:'Éclairage public',desc:'+15% pop de tous',         price:400,  bought:false,apply:()=>{shopB.pop=(shopB.pop||1)*1.15}},
  {id:'s6',name:'Banque royale',   desc:'+50% revenu château',      price:1200, bought:false,apply:()=>{shopB.castle=(shopB.castle||1)*1.5}},
  {id:'s7',name:'Portail magique', desc:'Débloque le Temple ⛩️',    price:2000, bought:false,apply:()=>{document.getElementById('bb-temple').style.display='flex'}},
];

let money=500,grid={},selCell=null,tool=null,tick=0,totalEarned=0;
let xp=0,level=1,prestigeCount=0,prestigeMult=1,prestigeDecline=false;
let claimedQuests=new Set();
let shopB={};

const cv=document.getElementById('gc');
const ctx=cv.getContext('2d');

const XP_LEVELS=[0,500,1200,2500,5000,10000,20000,50000,100000,Infinity];

const TILE_COLORS=[
  ['#1a0a3a','#1e0e40'],
  ['#0a1a3a','#0e1e40'],
  ['#0a2a1a','#0e2e1e'],
  ['#2a1a0a','#2e1e0e'],
];

const STARS=Array.from({length:60},()=>({
  x:Math.random()*520,y:Math.random()*310,
  r:Math.random()*1.3+0.3,
  a:Math.random()*0.8+0.2,
  tw:Math.random()*Math.PI*2,
  hue:Math.random()*360
}));

const PARTICLES=[];

function spawnParticle(x,y,color){
  PARTICLES.push({x,y,vx:(Math.random()-0.5)*2,vy:-Math.random()*2-1,life:30,maxLife:30,color});
}

function drawBg(){
  ctx.fillStyle='#08001a';
  ctx.fillRect(0,0,cv.width,cv.height);
}

function drawStars(){
  STARS.forEach(s=>{
    s.tw+=0.015;
    let a=s.a*(0.5+0.5*Math.sin(s.tw));
    let hue=s.hue+tick*0.3;
    ctx.fillStyle=`hsla(${hue},80%,85%,${a})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
}

function drawGrid(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    let x=c*TW,y=r*TH;
    let tidx=(c+r*2)%TILE_COLORS.length;
    let col=TILE_COLORS[tidx][(c+r)%2];
    ctx.fillStyle=col;
    ctx.fillRect(x,y,TW,TH);
    ctx.strokeStyle='rgba(150,50,255,0.15)';
    ctx.lineWidth=0.5;
    ctx.strokeRect(x+0.25,y+0.25,TW-0.5,TH-0.5);
  }
}

function drawBuilding(c,r,cell){
  let x=c*TW,y=r*TH;
  let t=TYPES[cell.type];
  let lv=cell.level||1;
  let pulse=0.5+0.5*Math.sin(tick*0.07+c*0.8+r*1.1);

  ctx.fillStyle=t.bg;
  ctx.fillRect(x+1,y+1,TW-2,TH-2);

  ctx.strokeStyle=t.border;
  ctx.lineWidth=1+pulse;
  ctx.strokeRect(x+2,y+2,TW-4,TH-4);
  ctx.lineWidth=1;

  let alpha=0.08+0.12*pulse;
  ctx.fillStyle=t.glow.replace('#','#')+Math.round(alpha*255).toString(16).padStart(2,'0');
  ctx.fillRect(x+1,y+1,TW-2,TH-2);

  ctx.font=(TW-14)+'px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,0.97)';
  ctx.fillText(t.e,x+TW/2,y+TH/2);

  if(lv>1){
    ctx.font='bold 9px sans-serif';
    ctx.fillStyle=t.glow;
    ctx.textAlign='center';
    ctx.fillText('★'+lv,x+TW/2,y+TH-5);
  }

  let wc=`rgba(${hexToRgb(t.glow)},${0.4+0.5*pulse})`;
  ctx.fillStyle=wc;
  for(let i=0;i<2;i++) ctx.fillRect(x+4+i*9,y+5,6,4);
}

function hexToRgb(hex){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

function drawSelection(c,r){
  let x=c*TW,y=r*TH;
  let p=0.5+0.5*Math.abs(Math.sin(tick*0.15));
  ctx.strokeStyle=`rgba(255,0,255,${p})`;
  ctx.lineWidth=2.5;
  ctx.strokeRect(x+1,y+1,TW-2,TH-2);
  ctx.lineWidth=1;
}

function drawParticles(){
  for(let i=PARTICLES.length-1;i>=0;i--){
    let p=PARTICLES[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;
    let a=p.life/p.maxLife;
    ctx.fillStyle=p.color.replace(')',`,${a})`).replace('rgb','rgba');
    ctx.beginPath();ctx.arc(p.x,p.y,2*a,0,Math.PI*2);ctx.fill();
    if(p.life<=0) PARTICLES.splice(i,1);
  }
}

function draw(){
  drawBg();
  drawStars();
  drawGrid();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    let k=c+','+r;
    if(grid[k]) drawBuilding(c,r,grid[k]);
    if(selCell&&selCell[0]===c&&selCell[1]===r) drawSelection(c,r);
  }
  drawParticles();
}

function animate(){tick++;draw();requestAnimationFrame(animate);}
animate();

function key(c,r){return c+','+r}
function msg(m){document.getElementById('msgbar').textContent=m}

function notify(m,ok=true){
  let el=document.getElementById('notify');
  el.textContent=m;
  el.style.background=ok?'#00cc66':'#cc0033';
  el.style.borderColor=ok?'#00ffaa':'#ff6688';
  el.style.opacity='1';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.opacity='0',2000);
}

function floatCoin(amount,x,y){
  let el=document.getElementById('float-coin');
  el.style.left=(x||20+Math.random()*420)+'px';
  el.style.top=(y||20+Math.random()*240)+'px';
  el.textContent='+'+amount+'💰';
  el.style.opacity='1';el.style.transform='translateY(0)';
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(-30px)';},120);
}

const state={
  count:t=>Object.values(grid).filter(c=>c.type===t).length,
  totalPop:()=>{let p=0;for(let k in grid){let c=grid[k],lv=c.level||1;p+=Math.round(TYPES[c.type].pop*lv*(shopB.pop||1));}return p;},
  totalInc:()=>{let i=0;for(let k in grid){let c=grid[k],lv=c.level||1;let b=(shopB[c.type]||1)*(shopB._g||1)*prestigeMult;i+=Math.round(TYPES[c.type].inc*lv*b);}return i;},
};

function addXP(amount){
  xp+=Math.round(amount*(shopB.xp||1));
  while(level<XP_LEVELS.length-1&&xp>=XP_LEVELS[level]){
    level++;notify('🎉 Niveau '+level+' atteint ! +'+level*100+'💰');money+=level*100;
  }
  updateXPBar();
}

function updateXPBar(){
  let cur=XP_LEVELS[level-1]||0,nxt=XP_LEVELS[level];
  let pct=nxt===Infinity?100:Math.min(100,Math.round((xp-cur)/(nxt-cur)*100));
  document.getElementById('xp-bar').style.width=pct+'%';
  document.getElementById('xp-label').textContent='Niv.'+level+' — '+(xp-cur)+' / '+(nxt===Infinity?'MAX':nxt-cur)+' XP';
}

function updateHUD(){
  let pop=state.totalPop(),inc=state.totalInc();
  document.getElementById('h-money').textContent=money.toLocaleString();
  document.getElementById('h-pop').textContent=pop;
  document.getElementById('h-inc').textContent='+'+inc;
  document.getElementById('h-pr').textContent=prestigeCount;
  document.querySelectorAll('.bb').forEach(b=>{
    let t=b.dataset.t;
    if(t) b.classList.toggle('off',TYPES[t].cost>money);
  });
  let ub=document.getElementById('upg-btn');
  if(selCell){
    let k=key(selCell[0],selCell[1]);
    if(grid[k]){
      let lv=grid[k].level||1,uc=Math.round(TYPES[grid[k].type].cost*0.6*lv);
      ub.style.display='flex';ub.textContent='⬆ Lv'+(lv+1)+' ('+uc+'💰)';
    } else ub.style.display='none';
  } else ub.style.display='none';
  
  if(!prestigeDecline) {
    if((money>=5000&&Object.keys(grid).length>=10&&prestigeCount===0)||
       (money>=50000&&Object.keys(grid).length>=20&&prestigeCount>=1))
      document.getElementById('prestige-banner').classList.add('show');
  }
}

function updateQuests(){
  let ql=document.getElementById('quest-list');
  ql.innerHTML='';
  QUESTS_DEF.forEach(q=>{
    if(claimedQuests.has(q.id)) return;
    let done=q.check(state);
    let div=document.createElement('div');
    div.className='qcard'+(done?' done':'');
    div.innerHTML=`<div class="qtitle">${q.title}</div><div>${q.desc}</div><div class="qrew">+${q.xp} XP  +${q.gold}💰</div>`
      +(done?`<button class="claim-btn" data-qid="${q.id}">✅ Réclamer !</button>`
             :`<div class="qpbar"><div class="qpfill" style="width:0%"></div></div>`);
    ql.appendChild(div);
  });
  ql.querySelectorAll('.claim-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      let q=QUESTS_DEF.find(x=>x.id===btn.dataset.qid);
      if(!q||claimedQuests.has(q.id)) return;
      claimedQuests.add(q.id);money+=q.gold;addXP(q.xp);
      notify('✅ Quête ! +'+q.gold+'💰 +'+q.xp+' XP');
      updateQuests();updateHUD();
    });
  });
}

function updateShop(){
  let sl=document.getElementById('shop-list');
  sl.innerHTML='';
  SHOP_DEF.forEach(s=>{
    let div=document.createElement('div');
    div.className='sitem'+(s.bought?' bought':'');
    div.innerHTML=`<div class="sname">${s.name}${s.bought?' ✓':''}</div><div class="sdesc">${s.desc}</div><div class="sprice">${s.bought?'Acheté ✓':s.price+'💰'}</div>`;
    if(!s.bought) div.addEventListener('click',()=>{
      if(money<s.price){notify('Pas assez d\'or !',false);return;}
      money-=s.price;s.bought=true;s.apply();
      notify('🛒 '+s.name+' acheté !');
      updateShop();updateHUD();
    });
    sl.appendChild(div);
  });
}

document.getElementById('tabs').querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    document.querySelectorAll('#tab-build,#tab-quests,#tab-shop').forEach(t=>t.classList.remove('on'));
    tab.classList.add('on');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('on');
    if(tab.dataset.tab==='quests') updateQuests();
    if(tab.dataset.tab==='shop') updateShop();
  });
});

cv.addEventListener('click',e=>{
  let rect=cv.getBoundingClientRect();
  let sx=cv.width/rect.width,sy=cv.height/rect.height;
  let px=(e.clientX-rect.left)*sx,py=(e.clientY-rect.top)*sy;
  let c=Math.floor(px/TW),r=Math.floor(py/TH);
  if(c<0||c>=COLS||r<0||r>=ROWS) return;
  let k=key(c,r);
  if(tool==='delete'){
    if(grid[k]){
      let t=TYPES[grid[k].type];
      for(let i=0;i<8;i++) spawnParticle(c*TW+TW/2,r*TH+TH/2,'rgb(255,50,50)');
      delete grid[k];notify('Démoli !',false);selCell=null;
    } else msg('Pas de bâtiment ici.');
  } else if(tool){
    let t=TYPES[tool];
    if(grid[k]) notify('Case occupée !',false);
    else if(money<t.cost) notify('Pas assez d\'or ! ('+t.cost+'💰)',false);
    else{
      money-=t.cost;grid[k]={type:tool,level:1};selCell=[c,r];
      addXP(t.xp);
      for(let i=0;i<12;i++) spawnParticle(c*TW+TW/2,r*TH+TH/2,`rgb(${hexToRgb(t.glow)})`);
      notify(t.e+' '+t.n+' construite ! +'+t.xp+' XP');
    }
  } else {
    if(grid[k]){selCell=[c,r];let cl=grid[k],lv=cl.level||1;msg(TYPES[cl.type].e+' '+TYPES[cl.type].n+' Lv'+lv+' — clique ⬆ pour améliorer');}
    else{selCell=null;msg('Case vide. Choisis un bâtiment à droite.');}
  }
  updateHUD();updateQuests();
});

document.querySelectorAll('.bb').forEach(b=>{
  b.addEventListener('click',()=>{
    let t=b.dataset.t;
    if(!t) return;
    if(TYPES[t].cost>money){notify('Pas assez d\'or !',false);return;}
    tool=t;selCell=null;
    document.querySelectorAll('.bb').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
    document.getElementById('del-btn').style.borderColor='';
    msg('Clique sur une case vide : '+TYPES[t].e+' '+TYPES[t].n);
    updateHUD();
  });
});

document.getElementById('del-btn').addEventListener('click',()=>{
  tool='delete';selCell=null;
  document.querySelectorAll('.bb').forEach(x=>x.classList.remove('sel'));
  msg('Clique sur un bâtiment pour le démolir.');
  updateHUD();
});

document.getElementById('upg-btn').addEventListener('click',()=>{
  if(!selCell) return;
  let k=key(selCell[0],selCell[1]);
  if(!grid[k]) return;
  let cl=grid[k],lv=cl.level||1,uc=Math.round(TYPES[cl.type].cost*0.6*lv);
  if(money<uc){notify('Pas assez d\'or ! ('+uc+'💰)',false);return;}
  money-=uc;cl.level=lv+1;
  let t=TYPES[cl.type];
  for(let i=0;i<10;i++) spawnParticle(selCell[0]*TW+TW/2,selCell[1]*TH+TH/2,`rgb(${hexToRgb(t.glow)})`);
  addXP(Math.round(t.xp*0.5));
  notify('⬆ '+t.e+' Lv'+cl.level+' !');
  updateHUD();
});

document.getElementById('prestige-yes').addEventListener('click',()=>{
  prestigeCount++;prestigeMult*=1.5;prestigeDecline=false;
  money=500+prestigeCount*200;grid={};selCell=null;tool=null;xp=0;level=1;totalEarned=0;
  claimedQuests.clear();SHOP_DEF.forEach(s=>s.bought=false);shopB={};
  document.getElementById('bb-temple').style.display='none';
  document.getElementById('prestige-banner').classList.remove('show');
  notify('✨ Prestige '+prestigeCount+' ! Bonus ×'+prestigeMult.toFixed(1));
  updateHUD();updateQuests();updateShop();updateXPBar();
});

document.getElementById('prestige-no').addEventListener('click',()=>{
  prestigeDecline=true;
  document.getElementById('prestige-banner').classList.remove('show');
});

setInterval(()=>{
  let inc=state.totalInc();
  if(inc>0){money+=inc;totalEarned+=inc;if(Math.random()<0.4) floatCoin(inc);}
  updateHUD();updateQuests();
},1000);

updateHUD();updateQuests();updateShop();updateXPBar();
</script>
